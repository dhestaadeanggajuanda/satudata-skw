version: '3.9'

services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # CKAN backend (bukan domain frontend) — di-bake ke HTML statis saat build.
        DMS: ${DMS:-https://data.singkawangkota.go.id}
    image: satudata-skw:latest
    container_name: satudata-skw
    ports:
      - "3000:3000"
    environment:
      DMS: ${DMS:-https://data.singkawangkota.go.id}
      NODE_ENV: production
    restart: unless-stopped
